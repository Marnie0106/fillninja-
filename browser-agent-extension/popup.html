<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AG2 Browser Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 400px;
            min-height: 500px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        .container {
            background: white;
            margin: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #dc3545;
            transition: background 0.3s;
        }

        .status-dot.connected {
            background: #28a745;
        }

        .status-text {
            font-size: 12px;
            color: #666;
        }

        .content {
            padding: 20px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea::placeholder {
            color: #adb5bd;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #666;
            border: 2px solid #e9ecef;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e9ecef;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .logs-container {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-entry {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            padding: 6px 0;
            border-bottom: 1px solid #333;
            color: #d4d4d4;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-entry.user {
            color: #9cdcfe;
        }

        .log-entry.agent {
            color: #b5cea8;
        }

        .log-entry.action {
            color: #ce9178;
        }

        .log-entry.error {
            color: #f48771;
        }

        .log-entry.system {
            color: #858585;
            font-style: italic;
        }

        .timestamp {
            color: #6a9955;
            margin-right: 8px;
        }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .settings-row:last-child {
            border-bottom: none;
        }

        .settings-label {
            font-size: 13px;
            color: #555;
        }

        input[type="text"],
        input[type="password"] {
            width: 150px;
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .quick-action-btn {
            padding: 10px;
            font-size: 12px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-action-btn:hover {
            background: #e9ecef;
            border-color: #667eea;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 13px;
        }

        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading .spinner {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AG2 Browser Agent</h1>
            <p>AI-powered web automation</p>
        </div>

        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">Disconnected</span>
        </div>

        <div class="content">
            <!-- Quick Actions -->
            <div class="section">
                <div class="section-title">Quick Actions</div>
                <div class="quick-actions">
                    <button class="quick-action-btn" data-prompt="Extract all links from this page">
                        🔗 Extract Links
                    </button>
                    <button class="quick-action-btn" data-prompt="Summarize the main content of this page">
                        📝 Summarize
                    </button>
                    <button class="quick-action-btn" data-prompt="Fill out any forms on this page with test data">
                        📝 Fill Forms
                    </button>
                    <button class="quick-action-btn" data-prompt="Take a screenshot and describe what you see">
                        📸 Screenshot
                    </button>
                </div>
            </div>

            <!-- Task Input -->
            <div class="section">
                <div class="section-title">Task</div>
                <textarea id="taskInput" placeholder="Describe what you want the agent to do...

Examples:
• Find the price of the top-rated product
• Fill out the contact form with name 'John Doe'
• Navigate to the pricing page and extract all plans
• Click the login button and wait for the form"></textarea>
                <div class="button-group">
                    <button class="btn-primary" id="runBtn">
                        <span class="spinner"></span>
                        <span class="btn-text">Run Agent</span>
                    </button>
                    <button class="btn-secondary" id="stopBtn" disabled>Stop</button>
                </div>
            </div>

            <!-- Logs -->
            <div class="section">
                <div class="section-title">Activity Log</div>
                <div class="logs-container" id="logsContainer">
                    <div class="empty-state">No activity yet. Start by entering a task above.</div>
                </div>
                <div class="button-group">
                    <button class="btn-secondary" id="clearBtn">Clear Logs</button>
                    <button class="btn-secondary" id="settingsBtn">Settings</button>
                </div>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
