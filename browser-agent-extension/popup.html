<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FillNinja Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 400px;
            min-height: 500px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        .container {
            background: white;
            margin: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header-logo {
            display: block;
            max-height: 56px;
            width: auto;
            margin: 0 auto 12px;
            object-fit: contain;
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #dc3545;
            transition: background 0.3s;
        }

        .status-dot.connected {
            background: #28a745;
        }

        .status-text {
            font-size: 12px;
            color: #666;
        }

        .popup-nav {
            display: flex;
            border-bottom: 1px solid #e9ecef;
            background: #f8f9fa;
        }

        .nav-tab {
            flex: 1;
            padding: 10px 8px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            background: transparent;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            border-radius: 0;
        }

        .nav-tab:hover {
            color: #495057;
            background: #f1f3f5;
        }

        .nav-tab-active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: #fff;
        }

        .page-panel {
            display: block;
        }

        .page-panel.hidden {
            display: none;
        }

        .profile-hint {
            font-size: 12px;
            color: #666;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        #personalProfileInput {
            min-height: 220px;
            font-size: 13px;
        }

        #profileSaveStatus {
            font-size: 12px;
            color: #28a745;
            min-height: 18px;
            margin-top: 8px;
        }

        .content {
            padding: 20px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea::placeholder {
            color: #adb5bd;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #666;
            border: 2px solid #e9ecef;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e9ecef;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .logs-container {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-entry {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            padding: 6px 0;
            border-bottom: 1px solid #333;
            color: #d4d4d4;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-entry.user {
            color: #9cdcfe;
        }

        .log-entry.agent {
            color: #b5cea8;
        }

        .log-entry.action {
            color: #ce9178;
        }

        .log-entry.error {
            color: #f48771;
        }

        .log-entry.system {
            color: #858585;
            font-style: italic;
        }

        .log-entry.reminder {
            color: #ffcc80;
            font-style: normal;
        }

        .log-entry.extract {
            color: #4ec9b0;
            font-style: normal;
        }

        .timestamp {
            color: #6a9955;
            margin-right: 8px;
        }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .settings-row:last-child {
            border-bottom: none;
        }

        .settings-label {
            font-size: 13px;
            color: #555;
        }

        input[type="text"],
        input[type="password"] {
            width: 150px;
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .context-picker-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
            font-size: 13px;
            color: #555;
        }

        .context-picker-row label {
            min-width: 70px;
            font-weight: 500;
        }

        .context-picker-row select {
            flex: 1;
            padding: 6px 8px;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            font-size: 13px;
            background: #fff;
        }

        .profile-toolbar {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 12px;
        }

        .profile-toolbar select {
            flex: 1;
            padding: 6px 8px;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            font-size: 13px;
            background: #fff;
        }

        .profile-toolbar button {
            flex: 0;
            padding: 6px 10px;
            font-size: 12px;
        }

        .profile-section-divider {
            border: none;
            border-top: 1px solid #e9ecef;
            margin: 20px 0 16px;
            height: 0;
        }

        .profile-section-title {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 12px;
        }

        input.name-input {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .quick-action-btn {
            padding: 10px;
            font-size: 12px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-action-btn:hover {
            background: #e9ecef;
            border-color: #667eea;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 13px;
        }

        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading .spinner {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img class="header-logo" src="icons/fillninja.png" alt="" width="56" height="56">
            <h1>FillNinja Agent</h1>
            <p>Discover candidate forms, then fill them when you choose</p>
        </div>

        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">Disconnected</span>
        </div>

        <div class="popup-nav" role="tablist">
            <button type="button" class="nav-tab nav-tab-active" id="navMainTab" role="tab" aria-selected="true">Agent</button>
            <button type="button" class="nav-tab" id="navProfileTab" role="tab" aria-selected="false">My profile</button>
        </div>

        <div class="content">
            <div id="page-main" class="page-panel">
            <!-- Context Picker -->
            <div class="section">
                <div class="context-picker-row">
                    <label for="projectSelect">Choose profile/document:</label>
                    <select id="projectSelect"></select>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="section">
                <div class="section-title">Quick Actions</div>
                <div class="quick-actions">
                    <button class="quick-action-btn" data-prompt="Fill out any forms on this page using Applicant data from My profile when the extension provides it; otherwise use clear placeholder values. Do not click Submit or any final apply/send button; stop after filling so I can review and submit myself.">
                        Fill forms
                    </button>
                </div>
            </div>

            <!-- Task Input -->
            <div class="section">
                <div class="section-title">Task</div>
                <textarea id="taskInput" placeholder="Describe what you want the agent to do...

Examples:
• Find the price of the top-rated product
• Fill out the contact form with name 'John Doe'
• Navigate to the pricing page and extract all plans
• Click the login button and wait for the form

Pipeline: attach PDF, DOCX, PPTX, or a video (voiceover / pitch), paste a public project page link, and/or type a goal."></textarea>
                <div class="button-group">
                    <button class="btn-primary" id="runBtn">
                        <span class="spinner"></span>
                        <span class="btn-text">Run on this tab</span>
                    </button>
                    <button class="btn-secondary" id="stopBtn" disabled>Stop</button>
                </div>
                <button type="button" class="btn-secondary" id="unfilledReminderBtn" style="width:100%;margin-top:10px;padding:8px;font-size:12px">
                    Show unfilled fields (this tab)
                </button>
            </div>

            <div class="section">
                <label style="display:block;font-size:12px;color:#555;margin-bottom:6px">
                    Project page link (optional)
                    <input type="text" id="sourceUrlInput" inputmode="url" autocomplete="off" placeholder="https://… (GitHub, portfolio, project page)" style="display:block;width:100%;margin-top:6px;padding:8px;font-size:12px;border:1px solid #e9ecef;border-radius:6px">
                </label>
                <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center">
                    <label style="font-size:11px;color:#555">Max forms
                        <input type="number" id="maxFormsInput" value="6" min="1" max="20" style="width:48px;margin-left:4px;padding:4px">
                    </label>
                    <label style="font-size:11px;color:#555">Parallel tabs (fill step)
                        <input type="number" id="maxParallelInput" value="2" min="1" max="6" style="width:48px;margin-left:4px;padding:4px">
                    </label>
                </div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
                    <button class="btn-primary" id="discoverFormsBtn" type="button">
                        <span class="btn-text">Discover forms</span>
                    </button>
                    <button class="btn-secondary" id="fillFromLastDiscoveryBtn" type="button">
                        <span class="btn-text">Fill from last discovery</span>
                    </button>
                </div>
            </div>

            </div>

            <div id="page-profile" class="page-panel hidden">
                <!-- About Me Section -->
                <div class="section">
                    <div class="section-title">About me</div>
                    <p class="profile-hint" style="margin-bottom:12px">
                        Store your résumés, profiles, and project facts. Upload documents to extract facts, or paste text directly. Switch between them when filling forms.
                    </p>
                    <div class="profile-toolbar">
                        <select id="projectSelectTab"></select>
                        <button type="button" class="btn-secondary" id="addProjectBtn" style="padding:6px 12px;font-size:12px">+ New</button>
                        <button type="button" class="btn-secondary" id="deleteProjectBtn" style="padding:6px 12px;font-size:12px">Delete</button>
                    </div>

                    <label style="display:block;font-size:12px;color:#555;margin-bottom:4px">Name</label>
                    <input type="text" id="projectNameInput" class="name-input" placeholder="e.g. My Resume 2024, Senior Dev, Personal Info, Grant Project">

                    <label style="display:block;font-size:12px;color:#555;margin-bottom:4px">Upload document (optional)</label>
                    <input type="file" id="projectFileInput" accept=".pdf,.docx,.pptx,.mp4,.webm,.mov,.mkv,.mpeg,.mpg,.m4v,.avi,video/*,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.presentationml.presentation" style="display:none" aria-hidden="true">
                    <button type="button" class="btn-secondary" id="pickProjectFileBtn" style="width:100%;margin-bottom:6px;padding:8px;font-size:12px">Choose file (PDF, DOCX, PPTX, or video)…</button>
                    <button type="button" class="btn-secondary" id="clearFileBtn" style="width:100%;margin-bottom:12px;padding:8px;font-size:12px">Clear file</button>

                    <label style="display:block;font-size:12px;color:#555;margin-bottom:4px">Facts &amp; information</label>
                    <textarea id="projectContextInput" placeholder="Paste info here, or extracted facts will appear after uploading a document. Include your contact info, experience, education, project details, etc." style="min-height:150px"></textarea>

                    <button type="button" class="btn-primary" id="saveProjectTabBtn" style="width:100%;margin-top:10px">Save</button>
                    <div id="projectTabSaveStatus" aria-live="polite"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
